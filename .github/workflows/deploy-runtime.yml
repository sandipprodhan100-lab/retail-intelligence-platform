name: Deploy Runtime to Azure VM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "runtime/**"
      - ".github/workflows/deploy-runtime.yml"

jobs:
  deploy-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/retail_vm_key
          chmod 600 ~/.ssh/retail_vm_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy runtime on Azure VM
        run: |
          ssh -i ~/.ssh/retail_vm_key ${{ secrets.VM_ADMIN_USERNAME }}@${{ secrets.VM_HOST }} "
            set -e

            cd /opt

            if [ ! -d retail-intelligence-platform ]; then
              git clone https://github.com/${{ github.repository }}.git retail-intelligence-platform
            fi

            cd retail-intelligence-platform
            git fetch origin
            git reset --hard origin/main

            mkdir -p runtime

            echo 'POSTGRES_USER=${{ secrets.POSTGRES_USER }}' > runtime/.env
            echo 'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}' >> runtime/.env
            echo 'POSTGRES_DB=${{ secrets.POSTGRES_DB }}' >> runtime/.env

            cd runtime

            docker compose down
            docker compose up -d --build

            sleep 15

            docker ps
            curl -f http://localhost:8000/health
          "