name: 03 - ADF Deploy Placeholder

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  adf-placeholder:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Placeholder
        run: |
          echo "ADF JSON deployment will be added after one pipeline is created and exported."
          echo "For MVP v1, create one ADF pipeline manually, validate it, then add exported JSON here."
